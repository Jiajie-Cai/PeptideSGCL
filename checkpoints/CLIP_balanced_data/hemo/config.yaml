epochs: 100
batch_size: 64
vocab_size: 25
task: hemo # hemo, nf
debug: false
seed: 3407

network:
  drp: 0.1
  proj_dim: 256
  GNN:
    input_dim: 11
    hidden_dim: 2048


  BERT:
    hidden_size: 256
    hidden_layers: 8
    attn_heads: 8
    dropout: 0.10

#optim:
optim:
  lr_gnn: 1.0e-4
  lr_bert: 6.0e-5


sch:
  name: lronplateau
  factor: 0.3
  patience: 3

paths:
  data: data/
  split: full/

loss:
  temperature: 0.1
#  use_intra: true
 # 消融实验配置
  ablation_mode: "no_intra"  # null(正常) / "no_intra" / "intra_only"

finetune:
  freeze_backbone: true        # 先只训分类头，稳定
  lr_head: 1.0e-4
  lr_backbone: 1.0e-5          # 如果你改 freeze_backbone: false 才会用到
  scheduler: lronplateau
  threshold_mode: mcc          # mcc 或 f1
  pos_weight: null             # 如果 hemo=1 少，可以设为 2~10
